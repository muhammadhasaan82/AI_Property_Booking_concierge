# CAG (Cache-Augmented Generation) Policy Store
# Pre-computed FAQ answers served from RAM to bypass LLM generation.
# Edit this file to add/update policies without recompiling the gateway.

[settings]
keyword_threshold = 0.6       # fraction of keywords that must match (0.0–1.0)
fuzzy_threshold = 0.82         # Jaro-Winkler similarity threshold (0.0–1.0)
ttl_seconds = 3600             # how long entries stay valid (1 hour)

# ─────────────────────────────────────────────────────────────────────
# Policies: each [[policies]] block is one cached FAQ answer.
#   id                  — unique identifier for telemetry
#   answer              — the pre-computed response returned to the user
#   keywords            — trigger words; if enough match the query, it's a hit
#   canonical_questions — reference phrasings for fuzzy matching fallback
# ─────────────────────────────────────────────────────────────────────

[[policies]]
id = "check_in_time"
answer = "Check-in is from 3:00 PM onwards. Early check-in may be available upon request, subject to availability. Please contact the property directly for arrangements."
keywords = ["check-in", "check", "time", "arrive", "arrival", "early", "when"]
canonical_questions = [
    "what time is check-in",
    "when can i check in",
    "check-in time",
    "what is the check-in time",
    "when is check in",
]

[[policies]]
id = "check_out_time"
answer = "Check-out is by 11:00 AM. Late check-out may be available for an additional fee — please ask the property at least 24 hours in advance."
keywords = ["check-out", "checkout", "leave", "departure", "late", "out"]
canonical_questions = [
    "what time is check-out",
    "when do i check out",
    "checkout time",
    "when is check out",
    "what is the check-out time",
]

[[policies]]
id = "pet_policy"
answer = "Pet policies vary by property. Some properties allow pets with a refundable deposit, while others do not permit animals. Check the specific property listing for details, or ask us to filter for pet-friendly options."
