canonical_questions = [
    "do you allow pets",
    "are pets allowed",
    "can i bring my dog",
    "pet policy",
    "is it pet friendly",
]

[[policies]]
id = "cancellation_policy"
answer = "Free cancellation is available up to 48 hours before your check-in date for a full refund. Cancellations within 48 hours may incur a charge equal to the first night's stay. Non-refundable rates, where offered, are clearly marked at booking."
keywords = ["cancel", "cancellation", "cancelling", "free", "policy", "48"]
canonical_questions = [
    "what is the cancellation policy",
    "can i cancel my booking",
    "how do i cancel",
    "cancellation rules",
    "is there free cancellation",
]

[[policies]]
id = "refund_policy"
answer = "Refunds for eligible cancellations are processed within 5–10 business days to your original payment method. If you paid via credit card, the refund timeline depends on your bank. For non-refundable bookings, no refund is issued."
