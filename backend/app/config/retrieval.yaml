rag:
  rrf_constant: 60
  vector_k: 6
  bm25_k: 6
  max_context_chars: 1500
  grounding_threshold: 0.4

retrieval:
  top_k: 10
  result_limit: 5
  scoring_weights:
    exact_doc: 1.0
    exact_title: 2.0
    token_doc: 0.5
    token_title: 1.0

embeddings:
  model_name: BAAI/bge-small-en-v1.5
  normalize_embeddings: true
  device: auto

chunking:
  chunk_size: 1000
  chunk_overlap: 200
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "
    - ""

chroma:
  persist_dir: data/chroma_faq
  collection_name: company_policies

ranking:
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L6-v2

llm:
  query_rewrite_model: gpt-5-nano
  query_rewrite_timeout_seconds: 6.0
  query_rewrite_max_tokens: 80
