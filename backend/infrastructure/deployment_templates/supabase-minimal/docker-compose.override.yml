version: "3.9"

x-json-file-logging: &json-file-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  db:
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "log_min_messages=fatal"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-512MB}"
      - "-c"
      - "min_wal_size=${POSTGRES_MIN_WAL_SIZE:-80MB}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-384MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}"
    logging: *json-file-logging

  auth:
    logging: *json-file-logging

  rest:
    logging: *json-file-logging

  kong:
    logging: *json-file-logging

  meta:
    logging: *json-file-logging

  studio:
    logging: *json-file-logging
