version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./local_chat_history.db:/app/local_chat_history.db
    depends_on:
      - rust_gateway
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  chainlit:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - fastapi
    command: chainlit run frontend/chainlit_app.py --host 0.0.0.0 --port 8501

  rust_gateway:
    build:
      context: ./rust_gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - RUST_LOG=info

volumes:
  data:
