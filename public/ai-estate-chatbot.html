<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Estate Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>html,body,#root{height:100%;} body{margin:0}</style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <!-- React + Babel for simple in-browser JSX transpile (dev only) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const IconSend = ({ className="w-6 h-6" }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L11 13" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const IconPhone = ({ className="w-6 h-6" }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const IconMessageCircle = ({ className="w-12 h-12" }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-4.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5z" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    function ChatBot(){
      const [messages, setMessages] = useState([
        {
          id: 1,
          type: 'bot',
          content: 'Real-Estate Agent',
          subtext: 'Get comprehensive advice on various aspects of real estate, from legalities to client management, tailored to your needs.',
          isWelcome: true
        }
      ]);
      const [inputValue, setInputValue] = useState('');
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => { scrollToBottom(); }, [messages]);

      const handleSend = () => {
        if (inputValue.trim()){
          const userMessage = { id: messages.length+1, type:'user', content: inputValue, isWelcome:false };
          setMessages(prev => [...prev, userMessage]);
          const text = inputValue;
          setInputValue('');
          setTimeout(()=>{
            const botMessage = { id: messages.length+2, type:'bot', content: getBotResponse(text), isWelcome:false };
            setMessages(prev=>[...prev, botMessage]);
          }, 700);
        }
      };

      const getBotResponse = (question) => {
        const responses = {
          'sales': 'To Boost Your Property Sales, Focus On Enhancing Your Property Listings With High-Quality Images And Detailed Descriptions. Leverage Targeted Social Media Ads And Collaborate With Local Influencers To Reach Potential Buyers. Additionally, Host Virtual Tours To Attract Remote Buyers.',
          'manage': 'When Managing Multiple Property Listings, Prioritize Organization And Efficiency. Use A Property Management Tool To Keep Track Of Listings, Deadlines, And Client Interactions. Regularly Update Your Listings With Current Information And High-Quality Images. Effective Communication With Clients And Timely Follow-Ups Are Crucial For Maintaining A Smooth Operation.',
          'default': 'Thank you for your question. I\'m here to help with real estate advice, property management tips, and market insights. Feel free to ask about increasing sales, managing listings, legal considerations, or client relations.'
        };
        const lower = (question||'').toLowerCase();
        if (lower.includes('sales') || lower.includes('increase')) return responses.sales;
        if (lower.includes('manage') || lower.includes('listing')) return responses.manage;
        return responses.default;
      };

      const quickQuestions = [
        'How Can I Increase My Property Sales In A Competitive Market?',
        'What Should I Consider When Managing Multiple Property Listings?'
      ];

      const handleQuickQuestion = (q)=> setInputValue(q);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-purple-950 to-slate-900 flex items-center justify-center p-4">
          <div className="w-full max-w-4xl h-[700px] flex flex-col">
            <div className="bg-gradient-to-r from-purple-900/50 to-indigo-900/50 backdrop-blur-sm border border-purple-500/20 rounded-t-3xl p-6 shadow-xl">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center shadow-lg">
                  <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 17L12 22L22 17" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 12L12 17L22 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <h1 className="text-2xl font-bold text-white">AI ESTATE</h1>
              </div>
            </div>

            <div className="flex-1 bg-gradient-to-b from-slate-900/95 to-indigo-950/95 backdrop-blur-sm overflow-y-auto p-6 space-y-6">
              {messages.map(message=> (
                <div key={message.id}>
                  {message.isWelcome ? (
                    <div className="flex flex-col items-center justify-center text-center space-y-4 py-12">
                      <div className="w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center shadow-2xl">
                        <IconMessageCircle className="w-12 h-12 text-white" />
                      </div>
                      <h2 className="text-3xl font-bold text-white">{message.content}</h2>
                      <p className="text-gray-300 max-w-2xl text-lg leading-relaxed">{message.subtext}</p>
                    </div>
                  ) : message.type === 'user' ? (
                    <div className="flex justify-end">
                      <div className="bg-gradient-to-br from-purple-600 to-indigo-700 text-white rounded-3xl rounded-tr-md px-6 py-4 max-w-2xl shadow-lg">
                        <p className="leading-relaxed">{message.content}</p>
                      </div>
                    </div>
                  ) : (
                    <div className="flex justify-start">
                      <div className="bg-gradient-to-br from-slate-800/90 to-slate-700/90 text-gray-100 rounded-3xl rounded-tl-md px-6 py-4 max-w-2xl shadow-lg border border-purple-500/20">
                        <p className="leading-relaxed">{message.content}</p>
                      </div>
                    </div>
                  )}
                </div>
              ))}

              {messages.length === 1 && (
                <div className="flex flex-col gap-4 pt-8">
                  {quickQuestions.map((question, index) => (
                    <button key={index} onClick={() => handleQuickQuestion(question)} className="bg-gradient-to-r from-purple-700/40 to-indigo-700/40 hover:from-purple-600/50 hover:to-indigo-600/50 text-white rounded-2xl px-6 py-4 text-left transition-all duration-300 border border-purple-500/30 hover:border-purple-400/50 shadow-lg hover:shadow-xl hover:scale-[1.02]">
                      <p className="leading-relaxed">{question}</p>
                    </button>
                  ))}
                </div>
              )}

              <div ref={messagesEndRef} />
            </div>

            <div className="bg-gradient-to-r from-purple-900/50 to-indigo-900/50 backdrop-blur-sm border-t border-purple-500/20 rounded-b-3xl p-6 shadow-xl">
              <div className="flex gap-3">
                <input
                  type="text"
                  value={inputValue}
                  onChange={(e)=>setInputValue(e.target.value)}
                  onKeyPress={(e)=> e.key === 'Enter' && handleSend()}
                  placeholder="Message Chatbot..."
                  className="flex-1 bg-slate-800/50 text-white placeholder-gray-400 rounded-full px-6 py-4 outline-none focus:ring-2 focus:ring-purple-500/50 border border-purple-500/20 transition-all"
                />
                <button onClick={handleSend} className="bg-white hover:bg-gray-100 text-purple-900 rounded-full p-4 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed" disabled={!inputValue.trim()}>
                  <IconSend className="w-6 h-6" />
                </button>
                <button 
                  onClick={() => window.location.href = '/static/index.html'}
                  className="bg-white hover:bg-gray-100 text-purple-900 rounded-full p-4 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105"
                >
                  <IconPhone className="w-6 h-6" />
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ChatBot));
  </script>
</body>
</html>
